<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡單測試</title>
    <style>
        #map {
            width: 100%;
            height: 600px;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .info {
            padding: 10px;
            background: #f0f0f0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>簡單地圖測試</h1>
    <div class="info" id="status">載入中...</div>
    <div id="map"></div>
    
    <script>
        console.log('1. 頁面載入');
        
        function initMap() {
            console.log('2. initMap 被呼叫');
            document.getElementById('status').textContent = '初始化地圖...';
            
            try {
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 25.0330, lng: 121.5654 },
                    zoom: 12
                });
                
                console.log('3. 地圖建立成功');
                document.getElementById('status').textContent = '✅ 地圖載入成功！';
                
                // 測試點擊
                map.addListener('click', (e) => {
                    console.log('點擊位置:', e.latLng.lat(), e.latLng.lng());
                    new google.maps.Marker({
                        position: e.latLng,
                        map: map
                    });
                });
                
            } catch (error) {
                console.error('4. 錯誤:', error);
                document.getElementById('status').textContent = '❌ 錯誤: ' + error.message;
            }
        }
        
        window.initMap = initMap;
    </script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap&libraries=places&language=zh-TW" async defer></script>
</body>
</html>
